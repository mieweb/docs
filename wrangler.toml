# Cloudflare Pages configuration for AI Assistant Functions
#
# This configures the Pages Functions bindings for the AI documentation assistant.
# The functions are in the /functions directory and get deployed automatically.

name = "docs"
compatibility_date = "2025-02-03"
compatibility_flags = ["nodejs_compat"]

# Cloudflare account ID - set this to your account
account_id = "10825d9d1d920e844ccd0326c66dfc45"  # Medical Informatics Engineering

# Output directory for Hugo build
# pages_build_output_dir = "public/eh"  # Set via CLI based on brand

# Workers AI binding for embeddings and LLM inference
[ai]
binding = "AI"

# Vectorize index for document embeddings
# Note: remote = true is required for local development
[[vectorize]]
binding = "VECTORIZE"
index_name = "docs-embeddings"
remote = true

# KV namespace for caching and index versioning.
#
# Used by functions/api/ai-assistant/search to surface the current vectordb
# content hash so search responses can be cached at the edge + browser +
# localStorage, with automatic invalidation on re-index.
#
# Create once per account (both eh-docs and wc-docs Pages projects can share
# the same namespace), then paste the returned id below:
#
#   npx wrangler kv namespace create DOCS_CACHE
#
# The same `id` is used for all environments; `preview_id` is only needed if
# you want a separate namespace for `wrangler pages dev` preview deploys.
[[kv_namespaces]]
binding = "DOCS_CACHE"
id = "fd6417d33dcf49678a786855e43bc106"

# Development settings
[dev]
port = 8788
